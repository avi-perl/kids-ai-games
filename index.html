<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Games</title>
<meta name="description" content="A collection of fun browser games for kids">
<meta name="theme-color" content="#4a90d9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fun Games">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    min-height: 100vh;
    color: #111;
  }

  /* ── Header ──────────────────────────────────────────── */
  header {
    text-align: center;
    padding: 56px 24px 40px;
  }
  .site-title {
    font-size: clamp(36px, 7vw, 64px);
    font-weight: 900;
    letter-spacing: -0.03em;
    color: #111;
    line-height: 1;
  }
  .site-sub {
    margin-top: 12px;
    font-size: clamp(15px, 2.5vw, 18px);
    color: #888;
    font-weight: 400;
  }

  /* ── Grid ────────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Wide: side-by-side ──────────────────────────────── */
  @media (min-width: 800px) {
    body { display: flex; height: 100vh; overflow: hidden; }

    header {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
      padding: 48px 40px;
      border-right: 1px solid rgba(0,0,0,0.09);
      height: 100vh;
    }

    .grid {
      flex: 1;
      overflow-y: auto;
      max-width: none;
      margin: 0;
      padding: 40px 32px;
      align-content: start;
    }
  }

  /* ── Card base ───────────────────────────────────────── */
  .card {
    display: block;
    text-decoration: none;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 0 rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.07);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    color: inherit;
  }
  .card.playable:hover {
    transform: translateY(-6px) scale(1.015);
    box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 20px 48px rgba(0,0,0,0.15);
  }
  .card.playable:active { transform: translateY(-2px) scale(1.005); }

  .card-art {
    height: 200px;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .card-body {
    padding: 20px 22px 22px;
  }
  .card-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.55;
  }
  .card-play {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    background: #111;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 8px;
    letter-spacing: 0.01em;
    transition: background 0.15s;
  }
  .card.playable:hover .card-play { background: #333; }
  .card-play-soon {
    display: inline-block;
    margin-top: 14px;
    color: #bbb;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Hill Jumper card art ────────────────────────────── */
  .art-hj {
    background: linear-gradient(180deg, #2b6cb0 0%, #4a90d9 35%, #87ceeb 65%, #c9e9ff 100%);
  }
  /* Sun */
  .art-hj::before {
    content: '';
    position: absolute;
    top: 20px; right: 18%;
    width: 44px; height: 44px;
    background: radial-gradient(circle, #fff9c4 40%, #ffe082 70%, rgba(255,224,130,0) 100%);
    border-radius: 50%;
  }
  /* Rolling hill (back) */
  .art-hj .hill-back {
    position: absolute;
    bottom: 38px; left: -20px; right: -20px;
    height: 110px;
    background: #2d5a27;
    border-radius: 55% 60% 0 0 / 90px 90px 0 0;
  }
  /* Rolling hill (front) */
  .art-hj .hill-front {
    position: absolute;
    bottom: 0; left: -30px; right: -30px;
    height: 80px;
    background: #3a7a30;
    border-radius: 48% 52% 0 0 / 70px 70px 0 0;
  }
  /* Grass line */
  .art-hj .grass {
    position: absolute;
    bottom: 78px; left: 0; right: 0;
    height: 4px;
    background: #5aaf4f;
    border-radius: 2px;
  }
  /* Characters */
  .art-hj .chars {
    position: absolute;
    bottom: 74px; left: 0; right: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 18px;
    font-size: 34px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
  }
  /* Cloud */
  .art-hj .cloud {
    position: absolute;
    background: rgba(255,255,255,0.88);
    border-radius: 50%;
  }
  .art-hj .c1 { width:44px;height:28px; top:28px; left:12%; }
  .art-hj .c2 { width:32px;height:20px; top:22px; left:17%; }
  .art-hj .c3 { width:36px;height:22px; top:24px; left:50%; }
  .art-hj .c4 { width:26px;height:16px; top:18px; left:55%; }

  /* ── Coming-soon card art ────────────────────────────── */
  .art-soon {
    background: linear-gradient(135deg, #e8e8e4 0%, #d8d8d0 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    opacity: 0.4;
  }
  .card.soon { opacity: 0.72; }
</style>
</head>
<body>

<header>
  <div class="site-title">🎮 Fun Games</div>
  <div class="site-sub">Pick a game and start playing</div>
</header>

<main class="grid">

  <!-- Hill Jumper -->
  <a class="card playable" href="./hill-jumper/">
    <div class="card-art art-hj">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <div class="cloud c4"></div>
      <div class="hill-back"></div>
      <div class="grass"></div>
      <div class="chars">
        <span>🦕</span>
        <span style="font-size:28px; margin-bottom:2px">🏃</span>
      </div>
      <div class="hill-front"></div>
    </div>
    <div class="card-body">
      <div class="card-name">Hill Jumper</div>
      <div class="card-desc">Run, jump over T-Rexes, dodge lava pits, and ride police cars. How far can you go?</div>
      <span class="card-play">▶ Play now</span>
    </div>
  </a>

  <!-- Coming soon 1 -->
  <div class="card soon">
    <div class="card-art art-soon">❓</div>
    <div class="card-body">
      <div class="card-name" style="color:#aaa">Coming Soon</div>
      <div class="card-desc">A new adventure is in the works…</div>
      <span class="card-play-soon">Coming soon</span>
    </div>
  </div>

  <!-- Coming soon 2 -->
  <div class="card soon">
    <div class="card-art art-soon">❓</div>
    <div class="card-body">
      <div class="card-name" style="color:#aaa">Coming Soon</div>
      <div class="card-desc">More fun is on the way!</div>
      <span class="card-play-soon">Coming soon</span>
    </div>
  </div>

</main>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
