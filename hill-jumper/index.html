function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);

  let title, sub, color;
  if (deathCause === 'firepool') {
    title = 'BURNED!'; sub = 'You fell into the fire pool!'; color = '#ff5500';
  } else {
    const def = ENEMY_TYPES[deathCause];
    title = def ? def.deathTitle : 'GAME OVER';
    sub   = def ? def.deathSub   : null;
    color = def ? def.deathColor : '#ff4444';
  }

  const distanceScore = Math.floor(terrainOffset / 1000);
  const airtimeScore  = Math.floor(airtimePixels / 1000);
  const finalScore    = distanceScore + airtimeScore + carKills;

  const cx = W / 2;
  ctx.textAlign = 'center';

  // Responsive font sizes — floor to ~14px on portrait phones to stay readable
  const vfloor = H >= 450 ? Math.min(Math.min(W, H), 480) * 0.036 : 0;
  const fs = (fh, fw) => Math.round(Math.max(Math.min(H * fh, W * fw), vfloor));
  const divider = (y) => {
    ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W * 0.10, y); ctx.lineTo(W * 0.90, y); ctx.stroke();
  };

  let gy = H * 0.10;

  // ── FINAL SCORE ───────────────────────────────────────────
  const s1 = fs(0.074, 0.060);
  ctx.font = `bold ${s1}px monospace`;
  ctx.fillStyle = '#FFE600';
  ctx.fillText('FINAL SCORE: ' + finalScore, cx, gy + s1);
  gy += s1 * 1.5 + H * 0.018;
  divider(gy); gy += H * 0.042;

  // ── Death cause ───────────────────────────────────────────
  const s2 = fs(0.054, 0.044);
  ctx.font = `bold ${s2}px monospace`;
  ctx.fillStyle = color;
  ctx.fillText(title, cx, gy + s2);
  gy += s2 * 1.35;

  if (sub) {
    const s3 = fs(0.027, 0.022);
    ctx.font = `${s3}px monospace`;
    ctx.fillStyle = '#ccc';
    ctx.fillText(sub, cx, gy + s3);
    gy += s3 * 1.6;
  }
  gy += H * 0.038;
  divider(gy); gy += H * 0.042;

  // ── Score breakdown ───────────────────────────────────────
  const rs   = fs(0.030, 0.024);
  const lCol = cx - W * 0.28;   // label (left-aligned)
  const vCol = cx + W * 0.06;   // value (right-aligned)
  const pCol = cx + W * 0.30;   // pts   (right-aligned)

  // Column headers
  ctx.font = `${Math.round(rs * 0.78)}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'left';  ctx.fillText('CATEGORY',  lCol, gy);
  ctx.textAlign = 'right'; ctx.fillText('VALUE', vCol, gy);
  ctx.fillText('PTS', pCol, gy);
  gy += rs * 1.3;

  function scoreRow(label, value, pts, highlight) {
    ctx.font = `${rs}px monospace`;
    ctx.textAlign = 'left';
    ctx.fillStyle = highlight ? '#fff' : '#aaa';
    ctx.fillText(label, lCol, gy);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.fillText(value, vCol, gy);
    ctx.fillStyle = pts > 0 ? '#FFD700' : '#666';
    ctx.fillText('+' + pts, pCol, gy);
    gy += rs * 1.65;
  }

  scoreRow('Distance',
    Math.round(terrainOffset).toLocaleString() + ' px',
    distanceScore);
  scoreRow('Airtime',
    (airtimeFrames / 60).toFixed(1) + ' s',
    airtimeScore);
  scoreRow('Critters booped',
    carKills + (carKills === 1 ? ' critter' : ' critters'),
    carKills,
    carKills > 0);

  gy += H * 0.012;
  divider(gy); gy += H * 0.038;

  // ── Rank display ──────────────────────────────────────────
  if (lastSavedEntry) {
    const rank = UserDB.rank(lastSavedEntry);
    if (rank) {
      const rfs = Math.max(fs(0.028, 0.023), 13);
      const rankStr = rank === 1 ? '🏆 New #1 — you\'re on top!' :
                      rank <= 3  ? `🥇 You ranked #${rank} — great run!` :
                                   `📍 You ranked #${rank}`;
      ctx.font = `bold ${rfs}px monospace`;
      ctx.fillStyle = rank <= 3 ? '#FFD700' : 'rgba(255,255,255,0.65)';
      ctx.textAlign = 'center';
      ctx.fillText(rankStr, cx, gy + rfs);
      gy += rfs * 2.2;
    }
  }

  // ── Play Again button ─────────────────────────────────────
  gy += Math.max(H * 0.008, 4);
  const btnW = Math.min(W * 0.55, 280);
  const btnH = Math.min(Math.max(H * 0.072, 44), 58);
  const btnX = cx - btnW / 2;
  const btnY = gy;
  restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, btnH * 0.22);
  ctx.fill();
  const s4 = fs(0.030, 0.024);
  ctx.font = `bold ${s4}px monospace`;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('▶  Play Again', cx, btnY + btnH * 0.65);

  // ── Leaderboard button ────────────────────────────────────
  const lbfs = Math.max(fs(0.024, 0.019), 12);
  ctx.font = `${lbfs}px monospace`;
  const lbLabel = '🏆  See Leaderboard';
  const lbW  = Math.min(ctx.measureText(lbLabel).width + 28, btnW);
  const lbH  = lbfs + 16;
  const lbX  = cx - lbW / 2;
  const lbY  = btnY + btnH + Math.max(H * 0.018, 10);
  ctx.fillStyle   = 'rgba(255,215,0,0.10)';
  ctx.strokeStyle = 'rgba(255,215,0,0.45)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.roundRect(lbX, lbY, lbW, lbH, lbH / 2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.fillText(lbLabel, cx, lbY + lbH * 0.68);
  gameoverLeaderBtn = { x: lbX, y: lbY, w: lbW, h: lbH };
}

function draw() {
  drawSky();
  for (const p of firePools) drawFirePool(p);
  // Rocks drawn before terrain so the ground surface overlaps their base (embedded look)
  for (const e of enemies) { if (e.type === 'rock') drawRock(e); }
  drawTerrain();
  for (const e of enemies) {
    if (e.type === 'rock') continue;
    const def = ENEMY_TYPES[e.type];
    if (def && def.draw) def.draw(e);
  }
  for (const v of vehicles) drawCar(v);
  drawPlayer();
  const liveScore = Math.floor(terrainOffset / 1000) + Math.floor(airtimePixels / 1000) + carKills;
  if (liveScore !== lastScore) { lastScore = liveScore; scoreEl.textContent = 'Score: ' + liveScore; }
  const subStr = `${Math.round(terrainOffset / 50)}m  ·  ${(airtimeFrames / 60).toFixed(1)}s air  ·  ${carKills} boops`;
  if (subStr !== lastSubStats) { lastSubStats = subStr; subStatsEl.textContent = subStr; }
  if (gameOver) drawGameOver();
  if (showWelcome) drawWelcome();
}

// ─── Main loop ────────────────────────────────────────────
function loop() {
  if (designMode) {
    drawGallery();
  } else {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

// ─── Gallery button ───────────────────────────────────────
const designBtn = document.getElementById('design-btn');
const uiEl = document.getElementById('ui');
designBtn.addEventListener('click', e => {
  e.stopPropagation();
  designMode = !designMode;
  designBtn.classList.toggle('active', designMode);
  uiEl.classList.toggle('hidden', designMode);
  settingsPanel.classList.remove('open');
});

// ─── Settings UI ──────────────────────────────────────────
const settingsBtn    = document.getElementById('settings-btn');
const settingsPanel  = document.getElementById('settings-panel');
const speedSlider    = document.getElementById('speed-slider');
const speedValLabel  = document.getElementById('speed-val');

const SPEED_LABELS = ['Slow', 'Normal', 'Fast', 'Faster', 'Max'];
const SPEED_OFFSETS = [-2, 0, 2, 4, 6]; // added to baseSpeed

function applySpeedSetting(val) {
  settingsSpeedOffset = SPEED_OFFSETS[val - 1];
  speedValLabel.textContent = SPEED_LABELS[val - 1];
}

speedSlider.addEventListener('input', () => applySpeedSetting(Number(speedSlider.value)));

settingsBtn.addEventListener('click', e => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});

// Close panel when clicking outside
document.addEventListener('click', e => {
  if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
    settingsPanel.classList.remove('open');
  }
});

// Prevent panel clicks from bubbling to canvas click handler
settingsPanel.addEventListener('click', e => e.stopPropagation());

applySpeedSetting(3); // default: Normal

// SFX toggle
document.getElementById('sfx-toggle').addEventListener('change', function() {
  sfxMuted = !this.checked;
  if (_rumbleGain) _rumbleGain.gain.value = sfxMuted ? 0 : 0.05;
});

// ─── User & Scoreboard modal logic ───────────────────────

function updateUserBtn() {
  const n = UserDB.current();
  document.getElementById('user-btn-name').textContent = n ? n : '?';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const userModal      = document.getElementById('user-modal');
const userModalTitle = document.getElementById('user-modal-title');
const userListEl     = document.getElementById('user-list');
const newNameInput   = document.getElementById('new-name-input');
const addUserBtn     = document.getElementById('add-user-btn');
const userPlayBtn    = document.getElementById('user-play-btn');
const scoreboardModal = document.getElementById('scoreboard-modal');
const sbContent      = document.getElementById('sb-content');

let userModalForced = false;  // true = must pick/create before dismissing

function renderUserList() {
  const users = UserDB.users();
  const cur   = UserDB.current();
  userListEl.innerHTML = '';
  users.forEach(u => {
    const card = document.createElement('div');
    card.className = 'user-card' + (u.name === cur ? ' active' : '');
    card.innerHTML = `<span class="user-name">${escHtml(u.name)}</span>${u.name === cur ? '<span class="user-check">✓</span>' : ''}`;
    card.addEventListener('click', () => {
      UserDB.setCurrent(u.name);
      currentUser = u.name;
      renderUserList();
      updateUserBtn();
      userPlayBtn.disabled = false;
    });
    userListEl.appendChild(card);
  });
  userPlayBtn.disabled = !cur;
}

function showUserModal(mode) {
  userModalForced = !UserDB.current();
  userModalTitle.textContent = mode === 'switch' ? 'Switch Player' : 'Who\'s Playing?';
  renderUserList();
  newNameInput.value = '';
  userModal.classList.add('open');
  if (UserDB.users().length === 0) setTimeout(() => newNameInput.focus(), 80);
}

function hideUserModal() {
  if (userModalForced && !UserDB.current()) return;
  userModal.classList.remove('open');
  currentUser = UserDB.current();
  updateUserBtn();
}

const newUserError = document.getElementById('new-user-error');

function addUserFromInput() {
  const name = newNameInput.value.trim();
  if (!name) return;
  if (knownUsers.some(n => n.toLowerCase() === name.toLowerCase())) {
    newUserError.textContent = 'That name is already taken.';
    newNameInput.select();
    return;
  }
  newUserError.textContent = '';
  UserDB.addUser(name);
  knownUsers = [...new Set([...knownUsers, name])];
  currentUser = name;
  newNameInput.value = '';
  renderUserList();
  updateUserBtn();
  userPlayBtn.disabled = false;
}

addUserBtn.addEventListener('click', addUserFromInput);
newNameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addUserFromInput(); }
});
newNameInput.addEventListener('input', () => { newUserError.textContent = ''; });

userPlayBtn.addEventListener('click', () => {
  currentUser = UserDB.current();
  hideUserModal();
});

userModal.addEventListener('click', e => {
  if (e.target === userModal && !userModalForced) hideUserModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (userModal.classList.contains('open') && !userModalForced) hideUserModal();
    if (scoreboardModal.classList.contains('open')) hideScoreboard();
  }
});

function renderScoreboard(scores) {
  scores = scores ?? UserDB.scores(20);
  const fmtDist = d => { const m = Math.round(d / 50); return m >= 1000 ? (m/1000).toFixed(1)+'km' : m+'m'; };
  const fmtAir  = f => (f / 60).toFixed(1) + 's';
  const rankCls = r => r === 1 ? 'sb-gold' : r === 2 ? 'sb-silver' : r === 3 ? 'sb-bronze' : 'sb-rank-num';
  const medal   = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : r;

  if (scores.length === 0) {
    sbContent.innerHTML = '<div class="sb-empty">No scores yet!<br>Play a game to get on the board 🎮</div>';
    return;
  }

  let html = `<div class="sb-head">
    <span></span><span>Player</span><span>Score</span>
  </div>`;
  scores.forEach((s, i) => {
    const rank = i + 1;
    const hi   = lastSavedEntry &&
                 s.name === lastSavedEntry.name &&
                 s.score === lastSavedEntry.score &&
                 s.playedAt === lastSavedEntry.playedAt;
    const extra = rank <= 3 ? ' sb-top3' : '';
    const boop  = s.boops === 1 ? '1 boop' : `${s.boops} boops`;
    html += `<div class="sb-row${extra}${hi ? ' sb-hi' : ''}">
      <span class="sb-rank ${rankCls(rank)}">${medal(rank)}</span>
      <span class="sb-name">${escHtml(s.name)}</span>
      <span class="sb-score">${s.score} pts</span>
      <span class="sb-stats">${fmtDist(s.distance)} &nbsp;·&nbsp; ${fmtAir(s.airtime)} air &nbsp;·&nbsp; ${boop}</span>
    </div>`;
  });
  sbContent.innerHTML = html;
}

async function showScoreboard() {
  renderScoreboard();
  scoreboardModal.classList.add('open');
  const remote = await sbFetchScores();
  if (remote) renderScoreboard(remote);
}
function hideScoreboard() {
  scoreboardModal.classList.remove('open');
}

document.getElementById('close-sb-btn').addEventListener('click', hideScoreboard);
scoreboardModal.addEventListener('click', e => {
  if (e.target === scoreboardModal) hideScoreboard();
});

const userToolbarBtn = document.getElementById('user-btn');
userToolbarBtn.addEventListener('click', e => {
  e.stopPropagation();
  settingsPanel.classList.remove('open');
  showUserModal('switch');
});

// ── Init ──────────────────────────────────────────────────
reset();
updateUserBtn();
if (!currentUser) showUserModal();
loop();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js', { scope: '../' });
}
</script>
