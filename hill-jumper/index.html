<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hill Jumper</title>
<meta name="theme-color" content="#87ceeb">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="../manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #87CEEB; overflow: hidden; font-family: monospace; }
  canvas { display: block; touch-action: none; }
  #ui {
    position: absolute; top: 16px; left: 8px;
    color: #333; font-size: 20px; text-align: left; pointer-events: none;
  }

  /* Toolbar — flex row, top-right */
  #toolbar {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 6px; align-items: center;
    z-index: 20;
  }
  #toolbar button {
    background: rgba(255,255,255,0.78); border: 2px solid #aaa;
    border-radius: 8px; padding: 8px 14px;
    font-size: 15px; cursor: pointer; user-select: none;
    color: #333; font-family: monospace;
    transition: background 0.15s; white-space: nowrap;
    min-height: 44px; min-width: 44px;
  }
  #toolbar button:hover { background: rgba(255,255,255,0.97); }
  #design-btn.active { background: #4A90D9; color: #fff; border-color: #2a70b9; }

  /* Settings panel — drops below toolbar */
  #settings-panel {
    display: none;
    position: absolute; top: 62px; right: 10px;
    background: rgba(255,255,255,0.97);
    border: 2px solid #aaa; border-radius: 12px;
    padding: 18px 20px; min-width: 220px; max-width: calc(100vw - 20px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    color: #222; font-family: monospace;
    z-index: 20;
  }
  #settings-panel.open { display: block; }
  #settings-panel h2 { font-size: 17px; margin-bottom: 16px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
  .setting-row { margin-bottom: 14px; }
  .setting-row label { display: block; margin-bottom: 6px; font-size: 14px; color: #444; }
  .setting-row input[type=range] { width: 100%; accent-color: #4A90D9; }
  .speed-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 2px; }
  #speed-val { font-weight: bold; color: #4A90D9; }

  /* Hide game HUD in gallery mode */
  #ui.hidden { display: none; }

  /* Toggle switch */
  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .toggle-row > span { font-size: 14px; color: #444; }
  .tog { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
  .tog input { opacity: 0; width: 0; height: 0; position: absolute; }
  .tog-track {
    position: absolute; inset: 0; border-radius: 24px;
    background: #ccc; cursor: pointer; transition: background .2s;
  }
  .tog-track::after {
    content: ''; position: absolute;
    width: 18px; height: 18px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: transform .2s;
  }
  .tog input:checked ~ .tog-track { background: #4A90D9; }
  .tog input:checked ~ .tog-track::after { transform: translateX(18px); }

  @media (max-width: 480px) {
    #toolbar button { font-size: 13px; padding: 8px 10px; }
    #settings-panel { right: 6px; top: 60px; padding: 14px 16px; min-width: 0; width: calc(100vw - 12px); }
    #ui { font-size: 17px; top: 14px; }
  }

  /* ── Portrait-phone rotation: hide HTML overlays, canvas covers everything ── */
  body.portrait-mode #ui,
  body.portrait-mode #toolbar { display: none; }

  /* ── User & Scoreboard Modals ─────────────────────────── */
  .game-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 200;
    align-items: center; justify-content: center; padding: 12px;
  }
  .game-modal.open { display: flex; }
  .modal-card {
    background: #0d1b2a; border: 2px solid #4A90D9; border-radius: 18px;
    padding: 22px 20px 18px; width: 100%; max-width: 440px;
    max-height: 88vh; display: flex; flex-direction: column; gap: 12px;
    font-family: monospace; color: #fff;
  }
  .modal-card h2 { font-size: 20px; margin: 0; color: #FFE600; text-align: center; }
  /* User list */
  #user-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 220px; }
  .user-card {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.06); border: 2px solid transparent;
    border-radius: 10px; padding: 11px 14px; cursor: pointer;
    transition: all .15s; font-family: monospace; user-select: none;
  }
  .user-card:hover  { background: rgba(255,255,255,0.11); }
  .user-card.active { background: rgba(74,144,217,0.18); border-color: #4A90D9; }
  .user-name  { flex: 1; font-size: 17px; font-weight: bold; }
  .user-check { color: #4A90D9; font-size: 18px; }
  /* New user row */
  #new-user-row { display: flex; gap: 8px; align-items: center; }
  #new-name-input {
    flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.08);
    border: 2px solid #555; border-radius: 8px; color: #fff;
    font-family: monospace; font-size: 16px; outline: none;
  }
  #new-name-input:focus { border-color: #4A90D9; }
  #new-name-input::placeholder { color: #555; }
  #add-user-btn {
    padding: 10px 16px; background: #4A90D9; border: none; border-radius: 8px;
    color: #fff; font-family: monospace; font-size: 15px; font-weight: bold;
    cursor: pointer; white-space: nowrap; min-height: 44px;
  }
  #add-user-btn:hover { background: #5ba3eb; }
  #new-user-error { color: #e74c3c; font-size: 13px; min-height: 18px; font-family: monospace; }
  /* Play button */
  #user-play-btn {
    width: 100%; padding: 14px; background: #27ae60; border: none; border-radius: 10px;
    color: #fff; font-family: monospace; font-size: 18px; font-weight: bold;
    cursor: pointer; min-height: 50px; transition: background .15s;
  }
  #user-play-btn:hover  { background: #2ecc71; }
  #user-play-btn:disabled { background: #2a4a35; color: #666; cursor: default; }
  /* User toolbar button */
  #user-btn {
    background: rgba(74,144,217,0.22); border: 2px solid #4A90D9;
    border-radius: 8px; padding: 8px 12px;
    font-size: 14px; cursor: pointer; user-select: none;
    color: #90C8F0; font-family: monospace;
    transition: background 0.15s; white-space: nowrap;
    min-height: 44px; max-width: 140px;
    overflow: hidden; text-overflow: ellipsis;
  }
  #user-btn:hover { background: rgba(74,144,217,0.38); }

  /* Scoreboard modal */
  #scoreboard-modal .modal-card {
    max-width: 580px; max-height: 94vh; padding: 0;
    border-color: #FFD700; border-width: 2px;
    gap: 0;
  }
  #sb-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-radius: 16px 16px 0 0;
    background: linear-gradient(135deg, #1c1800 0%, #2a2200 100%);
    border-bottom: 1px solid rgba(255,215,0,0.25); flex-shrink: 0;
  }
  #sb-header h2 { margin: 0; font-size: 22px; color: #FFD700; letter-spacing: 0.03em; }
  #close-sb-btn {
    background: rgba(255,255,255,0.08); border: 1px solid #555; border-radius: 8px;
    color: #aaa; padding: 6px 14px; font-family: monospace; font-size: 15px;
    cursor: pointer; min-height: 38px; flex-shrink: 0;
  }
  #close-sb-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  #sb-content {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    flex: 1; padding: 0 16px 20px;
  }
  /* Column header row */
  .sb-head {
    display: grid; grid-template-columns: 2.8em 1fr auto;
    gap: 6px; padding: 10px 4px 6px;
    color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-family: monospace; position: sticky; top: 0;
    background: #0d1b2a;
  }
  /* Score entry rows */
  .sb-row {
    display: grid; grid-template-columns: 2.8em 1fr auto;
    grid-template-rows: auto auto;
    gap: 0 6px; padding: 10px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-family: monospace;
  }
  .sb-row:last-child { border-bottom: none; }
  .sb-row.sb-top3 { background: rgba(255,215,0,0.04); }
  .sb-row.sb-hi   {
    background: rgba(255,230,0,0.10);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 8px; margin: 2px 0;
  }
  .sb-rank {
    grid-row: 1 / 3; align-self: center; text-align: center;
    font-weight: bold; font-size: 18px;
  }
  .sb-rank-num { font-size: 14px; color: #666; }
  .sb-gold   { color: #FFD700; }
  .sb-silver { color: #C0C0C0; }
  .sb-bronze { color: #CD7F32; }
  .sb-name  {
    grid-row: 1; font-weight: bold; font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

    grid-row: 1; font-weight: bold; font-size: 15px;

  }
  .sb-stats {
    grid-row: 2; grid-column: 2 / 4;
    color: #666; font-size: 11px; padding-top: 2px;
  }
  .sb-empty { text-align: center; color: #666; padding: 40px 0; font-size: 14px; line-height: 2; }

<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const scoreEl    = document.getElementById('score');
const subStatsEl = document.getElementById('substats');
let   lastSubStats = '';

// ─── Canvas — resizes to fill window ─────────────────────
let W = window.innerWidth;
let H = window.innerHeight;
let DPR = window.devicePixelRatio || 1;

// Cached render objects — invalidated on resize
let skyCache    = null;   // offscreen canvas for the static sky
let terrainGrad = null;   // terrain fill gradient
let lastScore   = -1;     // only write scoreEl when it changes
let isRotated   = false;  // true when canvas is rotated 90° CW for portrait phones

function resizeCanvas() {
  DPR = window.devicePixelRatio || 1;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  isRotated = vh > vw && vw < 600;
  document.body.classList.toggle('portrait-mode', isRotated);

  if (isRotated) {
    // Swap dimensions so game runs in landscape inside the rotated canvas
    W = vh;
    H = vw;
    // Rotate canvas 90° CW so it fills the portrait viewport
    canvas.style.position      = 'fixed';
    canvas.style.top           = '0';
    canvas.style.left          = '0';
    canvas.style.width         = vh + 'px';
    canvas.style.height        = vw + 'px';
    canvas.style.transformOrigin = '0 0';
    canvas.style.transform     = `translateY(${vh}px) rotate(90deg)`;
  } else {
    W = vw;
    H = vh;
    canvas.style.position      = '';
    canvas.style.top           = '';
    canvas.style.left          = '';
    canvas.style.width         = vw + 'px';
    canvas.style.height        = vh + 'px';
    canvas.style.transformOrigin = '';
    canvas.style.transform     = '';
  }

  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  skyCache    = null;
  terrainGrad = null;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── User & Score Database ────────────────────────────────
const UserDB = (() => {
  const KU = 'hj_users', KS = 'hj_scores', KC = 'hj_current';
  const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
  const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
  return {
    users()       { return load(KU, []); },
    current()     { return load(KC, null); },
    setCurrent(n) { save(KC, n); },
    addUser(name) {
      const list = this.users();
      if (!list.some(u => u.name === name)) list.push({ name, createdAt: Date.now() });
      save(KU, list);
      this.setCurrent(name);
    },
    // Saves a score entry and returns it (with playedAt set)
    addScore({ name, score, distance, airtime, boops }) {
      const entry = { name, score, distance, airtime, boops, playedAt: Date.now() };
      const list  = load(KS, []);
      list.push(entry);
      list.sort((a, b) => b.score - a.score);
      if (list.length > 100) list.length = 100;
      save(KS, list);
      return entry;
    },
    scores(n = 20) { return load(KS, []).slice(0, n); },
    rank(entry) {
      const i = load(KS, []).findIndex(
        s => s.name === entry.name && s.score === entry.score && s.playedAt === entry.playedAt
      );
      return i >= 0 ? i + 1 : null;
    },
  };
})();

let currentUser = UserDB.current();

// ─── API ──────────────────────────────────────────────────
const SB_KEY = 'sb_publishable_p6YpYEk1sDGkXtor_YtkOA_QgHrsEH4';
const SB_URL = 'https://xdxeahnkmdfwzxvgmnvq.supabase.co';

async function sbPostScore(entry) {
  try {
    await fetch(`${SB_URL}/rest/v1/scores`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        name:      entry.name,
        score:     entry.score,

        airtime:   entry.airtime,
        boops:     entry.boops,
        played_at: new Date(entry.playedAt).toISOString(),
      }),
    });
  } catch {}
}

async function sbFetchScores(n = 50) {
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/scores?select=name,score,distance,airtime,boops,played_at&order=score.desc&limit=${n}`,
      { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.map(r => ({
      name:     r.name,
      score:    r.score,
      distance: r.distance,
      airtime:  r.airtime,
      boops:    r.boops,
      playedAt: new Date(r.played_at).getTime(),
    }));
  } catch { return null; }
}

async function sbNameTaken(name) {
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/scores?select=name&name=ilike.${encodeURIComponent(name)}&limit=1`,
      { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
    );
    if (!res.ok) return false;
    const rows = await res.json();
    return rows.length > 0;
  } catch { return false; }
}

// ─── Physics ──────────────────────────────────────────────
const GRAVITY    = 0.5;
const JUMP_FORCE = -11;

// ─── Terrain (continuous, O(1)) ───────────────────────────
// terrainOffset tracks total world distance scrolled.
// terrainY(worldX) returns ground Y for any world position.
// getGroundAt(screenX) converts screen → world and evaluates.
let terrainOffset = 0;

// Fire pools and flat zones live here so getGroundAt can read them
let firePools    = [];
let firePoolTimer = 0;
const POOL_SLOPE  = 32;   // px of smooth slope on each side of the lava pit

let flatZones = [];        // flat pedestals under rocks: { worldX, flatY, hw, slope }
const FLAT_HW    = 40;    // half-width of flat area (px beyond rock edge)
const FLAT_SLOPE = 60;    // px of smooth transition into/out of flat area

function terrainY(worldX) {
  return H * 0.75
    - Math.sin(worldX * 0.008)  * 40
    - Math.sin(worldX * 0.020)  * 20
    - Math.sin(worldX * 0.055)  * 10
    - Math.cos(worldX * 0.013)  * 15;
}

function smoothstep(t) { return t * t * (3 - 2 * t); }

function getGroundAt(screenX) {
  let y = terrainY(screenX + terrainOffset);

  // Blend terrain flat under each rock pedestal
  for (const zone of flatZones) {
    const cx   = zone.worldX - terrainOffset;
    const left = cx - zone.hw - zone.slope;
    const rght = cx + zone.hw + zone.slope;
    if (screenX <= left || screenX >= rght) continue;
    let t = screenX < cx - zone.hw ? (screenX - left) / zone.slope
          : screenX > cx + zone.hw ? (rght - screenX) / zone.slope
          : 1;
    y = y + (zone.flatY - y) * smoothstep(t);
  }

  // Lower terrain into each lava pool pit
  for (const pool of firePools) {
    const s    = pool.worldStart - terrainOffset;
    const e    = pool.worldEnd   - terrainOffset;
    const left = s - POOL_SLOPE;
    const rght = e + POOL_SLOPE;
    if (screenX <= left || screenX >= rght) continue;
    let t = screenX < s ? (screenX - left)  / POOL_SLOPE
          : screenX > e ? (rght - screenX) / POOL_SLOPE
          : 1;
    y = y + (H + 80 - y) * smoothstep(t);
  }

  return y;
}

// ─── Enemy type registry ──────────────────────────────────
// To add a new enemy: add an entry here + a draw function below.
// Each definition needs: w, h, minDist, maxDist, hitboxPad,
//   deathTitle, deathSub, deathColor, draw, spawn().
const HEBREW_TITLES = ['בראשית','שמות','ויקרא','במדבר','דברים','תהלים','משלי','תורה'];

const ENEMY_TYPES = {
  book: {
    w: 52, h: 52,
    minDist: 450, maxDist: 800,
    hitboxPad: 6,
    deathTitle: 'CHOMPED!',
    deathSub:   'A T-Rex stomped right through you!',
    deathColor: '#2d6b28',
    galleryProps: {},
    galleryDesc:  'A charging T-Rex — jump over it!',
    galleryLabel: 'T-Rex',
    draw: drawTrex,
    spawn(groundY) {
      return {
        type: 'book',
        x: W + 60 + Math.random() * 80,
        y: groundY - this.h,
        w: this.w, h: this.h,
        walkSpeed: 0.8 + Math.random() * 1.2,
        frame: Math.random() * 6,
      };
    },
  },
  rock: {
    w: 57, h: 42,
    minDist: 900, maxDist: 1800,
    hitboxPad: 4,
    deathTitle: 'OUCH!',
    deathSub:   'You ran straight into a rock!',
    deathColor: '#666',
    galleryProps: { seed: 42 },
    galleryDesc:  'Stationary — but very solid!',
    draw: drawRock,
    spawnOk(worldX) {
      const clear = POOL_SLOPE + this.w + 180;  // world-px buffer from pool edges
      for (const pool of firePools) {
        if (worldX > pool.worldStart - clear && worldX < pool.worldEnd + clear) return false;
      }
      return true;
    },
    spawn() {
      const sx          = W + 60 + Math.random() * 80;
      const wx          = sx + this.w / 2 + terrainOffset;
      const flatY       = terrainY(wx);
      const groundOffset = Math.round(this.h * 0.30);   // sink 30% below ground surface
      flatZones.push({ worldX: wx, flatY, hw: this.w / 2 + FLAT_HW, slope: FLAT_SLOPE });
      return {
        type: 'rock',
        x: sx, y: flatY - this.h + groundOffset,
        w: this.w, h: this.h,
        walkSpeed: 0, frame: 0,
        seed: Math.random() * 100,
        groundOffset,
        zoneWorldX: wx,
      };
    },
  },
  mouse: {
    w: 44, h: 24,
    minDist: 300, maxDist: 650,
    hitboxPad: 5,
    deathTitle: 'CHOMPED!',
    deathSub:   'A Mouse Fish bit you!',
    deathColor: '#446677',
    galleryProps: { nearPlayer: true },
    galleryDesc:  'Swift and hungry — part mouse, part fish!',
    galleryLabel: 'Mouse Fish',
    draw: drawMouse,
    spawn(groundY) {
      return {
        type: 'mouse',
        x: W + 60 + Math.random() * 80,
        y: groundY - this.h,
        w: this.w, h: this.h,
        walkSpeed: 1.4 + Math.random() * 1.8,
        frame: Math.random() * 6,
        nearPlayer: false,
      };
    },
  },
};

// ─── Game state ───────────────────────────────────────────
let gameOver      = false;
let restartBtn    = null;
let showWelcome   = true;
let score         = 0;
let baseSpeed     = 3;
let speed         = 3;
let designMode  = false;
let designFrame = 0;

let jumpPressed = false;
let jumpBuffer  = 0;   // frames remaining to honour a recent jump press
let coyoteTimer = 0;   // frames remaining where ground-jump is still allowed after leaving ground
let deathCause  = '';

let scoreSaved      = false;  // guard: save score exactly once per game
let lastSavedEntry  = null;   // the entry returned by UserDB.addScore

// Canvas hit-areas for non-restartBtn interactive regions
let welcomeSwitchBtn  = null;
let welcomeLeaderBtn  = null;
let gameoverLeaderBtn = null;

// ── Stats tracking ────────────────────────────────────────
let airtimePixels = 0;   // px scrolled while player is airborne (same unit as distance)
let airtimeFrames = 0;   // raw frames airborne (used for display in seconds)
let carKills      = 0;   // enemies destroyed by car

const JUMP_BUFFER_FRAMES = 10;
const COYOTE_FRAMES      = 6;

// Settings: speed offset set by slider (0 = normal, higher = faster)
let settingsSpeedOffset = 0;

const player = {
  x: 120, y: 0, vy: 0,
  w: 36,  h: 48,
  onGround: false,
  canDoubleJump: true,
  jumped: false,        // true after first jump fires, prevents coyote being used twice
};

// All active enemies live in one flat array
let enemies  = [];
// One spawner object per enemy type, tracking its countdown
let spawners = [];

// ─── Vehicles (separate from enemies — player can ride them) ──
let vehicles      = [];
let vehicleTimer  = 600;
const CAR_W = 100, CAR_H = 44;
// The vehicle the player is currently riding (null if on foot)
let boardedVehicle = null;
let boardingBoost  = 0;   // extra speed while riding

function initSpawners() {
  spawners = Object.entries(ENEMY_TYPES).map(([type, def]) => ({
    type,
    timer: (def.minDist + Math.random() * (def.maxDist - def.minDist)) * 4,
  }));
}

function reset() {
  stopCarRumble();
  gameOver      = false;
  score         = 0;
  baseSpeed     = 3;
  speed         = 3;
  terrainOffset = 0;
  deathCause    = '';
  airtimePixels = 0;
  airtimeFrames = 0;
  carKills      = 0;
  enemies       = [];
  firePools     = [];
  flatZones     = [];
  firePoolTimer = 4000 + Math.random() * 2000;
  vehicles      = [];
  boardedVehicle = null;
  boardingBoost  = 0;
  vehicleTimer  = 1200 + Math.random() * 800;
  jumpPressed    = false;
  jumpBuffer     = 0;
  coyoteTimer    = 0;
  scoreSaved     = false;
  lastSavedEntry = null;
  player.vy            = 0;
  player.onGround      = false;
  player.canDoubleJump = true;
  player.jumped        = false;
  initSpawners();
  player.y = getGroundAt(player.x + player.w / 2) - player.h;
}

// ─── Audio system ─────────────────────────────────────────
let audioCtx   = null;
let musicGain  = null;
let musicMuted = true;   // default: music off
let sfxMuted   = true;
let _mLoopId   = null;
let _rumbleOsc = null, _rumbleGain = null;

const _BPM  = 132;
const _B    = 60 / _BPM;         // quarter beat ≈ 0.455s
const _h    = _B * 0.5;          // eighth note

// Simple 8-bar loop in C pentatonic
const _MEL = [
  [329.63,_h],[392,_h],[440,_h],[523.25,_h],  // bar 1 rising
  [440,_h],[392,_h],[329.63,_B],               // bar 2 fall
  [293.66,_h],[329.63,_h],[392,_h],[329.63,_h],// bar 3 bounce
  [261.63,_B],[293.66,_h],[261.63,_h],         // bar 4 resolve
  [329.63,_h],[392,_h],[440,_h],[523.25,_h],   // bar 5 repeat
  [587.33,_h],[523.25,_h],[440,_B],            // bar 6 high
  [392,_h],[440,_h],[392,_h],[329.63,_h],      // bar 7 descend
  [261.63,_B],[0,_h],[261.63,_h],              // bar 8 rest+end
];

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = musicMuted ? 0 : 0.015;
    musicGain.connect(audioCtx.destination);
    _scheduleMusic(audioCtx.currentTime + 0.15);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function _scheduleMusic(t0) {
  if (!audioCtx || !musicGain) return;
  const total = _MEL.reduce((s,[,d])=>s+d, 0);
  let t = t0;
  for (const [freq, dur] of _MEL) {
    if (freq > 0) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(musicGain);
      o.type = 'square'; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(1, t + 0.01);
      g.gain.setValueAtTime(1, t + dur * 0.72);
      g.gain.linearRampToValueAtTime(0, t + dur * 0.88);
      o.start(t); o.stop(t + dur);
    }
    t += dur;
  }
  // Bass pulse every quarter beat
  const bass = [130.81, 196.00, 130.81, 196.00];
  let bt = t0, bi = 0;
  while (bt < t0 + total - _B * 0.4) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(musicGain);
    o.type = 'triangle'; o.frequency.value = bass[bi % bass.length];
    g.gain.setValueAtTime(0, bt);
    g.gain.linearRampToValueAtTime(0.5, bt + 0.01);
    g.gain.linearRampToValueAtTime(0, bt + _B * 0.38);
    o.start(bt); o.stop(bt + _B * 0.45);
    bt += _B; bi++;
  }
  _mLoopId = setTimeout(() => _scheduleMusic(t0 + total), (total - 0.2) * 1000);
}

// SFX primitives
function _osc(f0, f1, dur, type, vol) {
  if (sfxMuted || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type;
  const t = audioCtx.currentTime;
  o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.linearRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t); g.gain.linearRampToValueAtTime(0, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}
function _noise(dur, cutoff, vol) {
  if (sfxMuted || !audioCtx) return;
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, Math.ceil(sr * dur), sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
  const src = audioCtx.createBufferSource();
  const flt = audioCtx.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=cutoff;
  const g = audioCtx.createGain();
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  g.gain.setValueAtTime(vol, t); g.gain.linearRampToValueAtTime(0, t+dur);
  src.start(t);
}

function sfxJump()  { _osc(200, 440, 0.09, 'square', 0.10); }
function sfxLand()  { _noise(0.07, 220, 0.14); }
function sfxBoop()  { _osc(650,950,0.06,'square',0.11); setTimeout(()=>_osc(950,1100,0.05,'square',0.09),65); }
function sfxBoard() { [300,420,600].forEach((f,i)=>setTimeout(()=>_osc(f,f,0.06,'square',0.085),i*65)); }
function sfxCrash() { _noise(0.3,800,0.225); _osc(220,55,0.25,'sawtooth',0.14); }
function sfxDeath() {
  if (sfxMuted || !audioCtx) return;
  const t = audioCtx.currentTime;
  [[392,0],[349,0.13],[311,0.26],[262,0.39]].forEach(([f,dt])=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='square'; o.frequency.value=f;
    g.gain.setValueAtTime(0.10,t+dt); g.gain.linearRampToValueAtTime(0,t+dt+0.12);
    o.start(t+dt); o.stop(t+dt+0.14);
  });
}

function startCarRumble() {
  if (!audioCtx || _rumbleOsc) return;
  _rumbleGain = audioCtx.createGain();
  _rumbleGain.gain.value = sfxMuted ? 0 : 0.05;
  _rumbleGain.connect(audioCtx.destination);
  _rumbleOsc = audioCtx.createOscillator();
  _rumbleOsc.type = 'triangle';
  _rumbleOsc.frequency.value = 72;
  _rumbleOsc.connect(_rumbleGain);
  _rumbleOsc.start();
}
function stopCarRumble() {
  if (_rumbleOsc) { try { _rumbleOsc.stop(); } catch(e){} _rumbleOsc = null; }
  if (_rumbleGain) { try { _rumbleGain.disconnect(); } catch(e){} _rumbleGain = null; }
}

// ─── Input ────────────────────────────────────────────────
function hitRestartBtn(x, y) {
  return hits(restartBtn, x, y);
}

document.addEventListener('keydown', e => {
  ensureAudio();
  if (showWelcome) { if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter') { e.preventDefault(); showWelcome = false; } return; }
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameOver) return;
    if (!jumpPressed) jumpBuffer = JUMP_BUFFER_FRAMES;
    jumpPressed = true;
  }
  if (e.code === 'Enter' && gameOver) { reset(); return; }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
});
function hits(btn, x, y) {
  return btn && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h;
}

function handleCanvasPress(x, y) {
  // Convert portrait-rotated viewport coords → game coords
  if (isRotated) { const gx = W - y; y = x; x = gx; }
  ensureAudio();
  if (showWelcome) {
    if (hits(welcomeSwitchBtn, x, y))  { showUserModal('switch'); return; }
    if (hits(welcomeLeaderBtn, x, y))  { showScoreboard();        return; }
    if (!currentUser) { showUserModal(); return; }
    showWelcome = false;
    return;
  }
  if (gameOver) {
    if (hits(gameoverLeaderBtn, x, y)) { showScoreboard(); return; }
    if (hitRestartBtn(x, y))           { reset();          return; }
    return;
  }
  jumpBuffer  = JUMP_BUFFER_FRAMES;
  jumpPressed = true;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  handleCanvasPress(e.touches[0].clientX, e.touches[0].clientY);
});
canvas.addEventListener('touchend',  () => { jumpPressed = false; });
canvas.addEventListener('click', e => { handleCanvasPress(e.clientX, e.clientY); });

// ─── Update ───────────────────────────────────────────────
function update() {
  if (gameOver || showWelcome) return;

  // Scroll world
  terrainOffset += speed;

  // Update all enemies: move, animate, stick to ground
  for (const e of enemies) {
    e.x -= speed + e.walkSpeed;
    e.frame += 0.1;
    e.y = getGroundAt(e.x + e.w / 2) - e.h + (e.groundOffset || 0);
    if (e.type === 'mouse') e.nearPlayer = (e.x - player.x) < 100;
    if (e.type === 'car' && e.state === 'available' && e.x + e.w < player.x) e.state = 'missed';
  }
  enemies = enemies.filter(e => e.x + e.w > -80 && e.y + e.h < H);
  // Remove flat zones whose rock has scrolled off-screen or been destroyed
  if (flatZones.length) {
    const alive = new Set(enemies.filter(e => e.zoneWorldX).map(e => e.zoneWorldX));
    flatZones = flatZones.filter(z => alive.has(z.worldX));
  }

  // Tick spawners; create new enemy when timer expires
  for (const s of spawners) {
    s.timer -= speed;
    if (s.timer <= 0) {
      const def    = ENEMY_TYPES[s.type];
      const ex     = W + 60 + Math.random() * 80;
      const worldX = ex + terrainOffset;
      if (def.spawnOk && !def.spawnOk(worldX)) {
        s.timer = 200;  // blocked by lava proximity — retry after a short delay
      } else {
        enemies.push(def.spawn(getGroundAt(ex)));
        const ease = 1 + (1 - Math.min(1, terrainOffset / 12000)) * 3;
        s.timer = (def.minDist + Math.random() * (def.maxDist - def.minDist)) * ease;
      }
    }
  }

  // ── Vehicle spawning & movement ───────────────────────────
  vehicleTimer -= speed;
  if (vehicleTimer <= 0) {
    const vx = W + 80 + Math.random() * 60;
    const vwx = terrainOffset + vx;
    const inPool = firePools.some(p =>
      vwx + CAR_W > p.worldStart - POOL_SLOPE && vwx < p.worldEnd + POOL_SLOPE);
    // Exclude the full rock flat zone + slope on both sides so the car never
    // spawns on the ramp or overlapping the rock itself.
    const nearRock = flatZones.some(z =>
      vwx + CAR_W > z.worldX - z.hw - z.slope &&
      vwx         < z.worldX + z.hw + z.slope);
    if (!inPool && !nearRock) {
      vehicles.push({ x: vx, y: getGroundAt(vx + CAR_W / 2) - CAR_H,
                      w: CAR_W, h: CAR_H, frame: 0, state: 'available', vy: 0, onGround: false });
      vehicleTimer = 1200 + Math.random() * 800;
    } else {
      vehicleTimer = 300; // retry soon
    }
  }
  for (const v of vehicles) {
    if (v.state !== 'boarded') v.x -= speed;
    v.frame += 0.1;
    if (v.state !== 'boarded') v.y = getGroundAt(v.x + v.w / 2) - v.h;
    if (v.state === 'available' && v.x + v.w < player.x) v.state = 'missed';
  }
  vehicles = vehicles.filter(v => v.x + v.w > -120);

  // ── Boarding detection ────────────────────────────────────
  if (!boardedVehicle) {
    const { x: px, y: py, w: pw, h: ph } = player;
    for (const v of vehicles) {
      if (v.state !== 'available') continue;
      if (px + pw > v.x + 6 && px < v.x + v.w - 6 && py + ph > v.y + 6 && py < v.y + v.h) {
        boardedVehicle = v;
        v.state = 'boarded';
        v.vy = 0;
        v.x = player.x + player.w / 2 - v.w / 2;
        boardingBoost = 2;
        sfxBoard(); startCarRumble();
        break;
      }
    }
  }

  // ── Boarded vehicle physics ───────────────────────────────
  if (boardedVehicle) {
    const bv = boardedVehicle;
    if (!vehicles.includes(bv)) {
      boardedVehicle = null;
      stopCarRumble(); deathCause = 'firepool'; gameOver = true; sfxDeath();
    } else {
      // Apply gravity and ground collision to the vehicle
      bv.vy += GRAVITY;
      bv.y  += bv.vy;
      const vGroundY = getGroundAt(bv.x + bv.w / 2) - bv.h;
      // Eject player if car is over lava
      if (vGroundY > H * 0.86) {
        vehicles = vehicles.filter(v => v !== bv);
        boardedVehicle = null;
        boardingBoost  = 0;
        player.vy           = JUMP_FORCE * 1.1;
        player.onGround     = false;
        player.jumped       = true;
        player.canDoubleJump = true;
        stopCarRumble(); sfxJump();
      } else if (bv.y >= vGroundY) {
        bv.y  = vGroundY;
        bv.vy = 0;
        bv.onGround = true;
      } else {
        bv.onGround = false;
      }

      if (jumpBuffer > 0) {
        if (bv.onGround) {
          // First jump: vehicle and player jump together
          bv.vy = JUMP_FORCE;
          bv.onGround = false;
          jumpBuffer = 0;
        } else {
          // Second jump (already in air): player exits with a jump
          stopCarRumble();
          boardedVehicle = null;
          bv.state = 'missed';
          boardingBoost = 0;
          player.vy = JUMP_FORCE;
          player.onGround = false;
          player.jumped = true;
          player.canDoubleJump = false;
          jumpBuffer = 0;
        }
      }

      if (boardedVehicle) {
        // Lock player on top of car roof
        player.x  = Math.round(bv.x + (bv.w - player.w) / 2);
        player.y  = bv.y - player.h;
        player.vy = 0;
        player.onGround = bv.onGround;
        if (bv.onGround) coyoteTimer = COYOTE_FRAMES;
      }
    }
  }

  // ── Player physics (skipped while riding) ─────────────────
  if (!boardedVehicle) {
  const groundY = Math.min(
    getGroundAt(player.x + 2),
    getGroundAt(player.x + player.w - 2)
  );
  player.vy += GRAVITY;
  player.y  += player.vy;

  if (player.y + player.h >= groundY) {
    player.y             = groundY - player.h;
    player.vy            = 0;
    if (!player.onGround) sfxLand();
    player.onGround      = true;
    player.jumped        = false;
    player.canDoubleJump = true;
    coyoteTimer          = COYOTE_FRAMES;
  } else {
    player.onGround = false;
    if (coyoteTimer > 0) coyoteTimer--;
  }

  // Jump buffer: honour a press that happened up to JUMP_BUFFER_FRAMES ago
  if (jumpBuffer > 0) {
    jumpBuffer--;
    const canGroundJump = player.onGround || (coyoteTimer > 0 && !player.jumped);
    if (canGroundJump) {
      player.vy       = JUMP_FORCE;
      player.onGround = false;
      player.jumped   = true;
      coyoteTimer     = 0;
      jumpBuffer      = 0;
      sfxJump();
    } else if (player.canDoubleJump) {
      player.vy            = JUMP_FORCE;
      player.canDoubleJump = false;
      jumpBuffer           = 0;
      sfxJump();
    }
  }
  } // end !boardedVehicle

  // Fire pool spawning — size capped so a single jump at current speed can clear it
  firePoolTimer -= speed;
  if (firePoolTimer <= 0) {
    const airTime  = (2 * Math.abs(JUMP_FORCE)) / GRAVITY;         // ~44 frames
    const maxTotal = airTime * speed * 0.82;                        // 82% of max distance
    const flatW    = Math.min(60, Math.max(28, maxTotal - 2 * POOL_SLOPE));
    const wx = terrainOffset + W + 100 + Math.random() * 60;
    firePools.push({ worldStart: wx, worldEnd: wx + flatW, frame: 0, seed: Math.random() * 100 });
    const poolEase = 1 + (1 - Math.min(1, terrainOffset / 12000)) * 2;
    firePoolTimer = (1500 + Math.random() * 1200) * poolEase;
  }
  for (const p of firePools) p.frame += 0.06;
  firePools = firePools.filter(p => p.worldEnd - terrainOffset + POOL_SLOPE > -60);

  // Die if player falls to the bottom (into a fire pool)
  if (player.y + player.h >= H) {
    deathCause = 'firepool';
    gameOver   = true;
    sfxDeath();
  }

  // Collision — all vehicles boop enemies regardless of boarding state
  let survivingEnemies = [...enemies];
  for (const v of vehicles) {
    const { x: bx, y: by, w: bw, h: bh } = v;
    const next = [];
    for (const e of survivingEnemies) {
      const pad = ENEMY_TYPES[e.type].hitboxPad;
      const hit = bx + bw > e.x + pad && bx < e.x + e.w - pad &&
                  by + bh > e.y + pad && by < e.y + e.h;
      if (hit && e.type === 'rock') {
        if (v === boardedVehicle) {
          // Rock crashes the boarded car — eject the player upward
          sfxCrash(); stopCarRumble();
          v.state = 'missed';
          boardingBoost  = 0;
          boardedVehicle = null;
          player.vy           = JUMP_FORCE * 0.75;
          player.onGround     = false;
          player.jumped       = true;
          player.canDoubleJump = true;
        }
        next.push(e);
      } else if (!hit) {
        next.push(e);
      } else {
        carKills++; sfxBoop();
      }
    }
    survivingEnemies = next;
  }
  enemies = survivingEnemies;

  // Player-enemy collision (only when not riding)
  if (!boardedVehicle) {
    const { x: px, y: py, w: pw, h: ph } = player;
    for (const e of enemies) {
      if (gameOver) break;
      const pad = ENEMY_TYPES[e.type].hitboxPad;
      if (px + pw > e.x + pad && px < e.x + e.w - pad &&
          py + ph > e.y + pad && py < e.y + e.h) {
        deathCause = e.type;
        gameOver   = true;
        sfxDeath();
      }
    }
  }

  // Airtime — accumulate same pixel-unit as distance so scoring is comparable
  const airborne = boardedVehicle ? !boardedVehicle.onGround : !player.onGround;
  if (airborne) { airtimePixels += speed; airtimeFrames++; }

  // Score & progressive difficulty
  score++;
  baseSpeed = 3 + Math.floor(score / 500) * 0.5;
  if (baseSpeed > 6) baseSpeed = 6;
  speed = Math.max(1, baseSpeed + settingsSpeedOffset + boardingBoost);

  // Save score exactly once when the game ends
  if (gameOver && !scoreSaved && currentUser) {
    scoreSaved = true;
    lastSavedEntry = UserDB.addScore({
      name:     currentUser,
      score:    Math.floor(terrainOffset / 1000) + Math.floor(airtimePixels / 1000) + carKills,
      distance: terrainOffset,
      airtime:  airtimeFrames,
      boops:    carKills,
    });
    sbPostScore(lastSavedEntry);
  }
}

// ─── Draw helpers ─────────────────────────────────────────
function buildSkyCache() {
  const oc  = document.createElement('canvas');
  oc.width  = Math.round(W * DPR);
  oc.height = Math.round(H * DPR);
  const oc2 = oc.getContext('2d');
  oc2.scale(DPR, DPR);

  const grad = oc2.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#4A90D9');
  grad.addColorStop(0.3, '#87CEEB');
  grad.addColorStop(0.7, '#B0E0FF');
  grad.addColorStop(1,   '#FFECD2');
  oc2.fillStyle = grad;
  oc2.fillRect(0, 0, W, H);

  const sx = W * 0.85, sy = H * 0.18;
  const sunGlow = oc2.createRadialGradient(sx, sy, 10, sx, sy, 60);
  sunGlow.addColorStop(0,   '#FFF9C4');
  sunGlow.addColorStop(0.5, '#FFE082');
  sunGlow.addColorStop(1,   'rgba(255,224,130,0)');
  oc2.beginPath(); oc2.arc(sx, sy, 40, 0, Math.PI * 2);
  oc2.fillStyle = sunGlow; oc2.fill();
  oc2.beginPath(); oc2.arc(sx, sy, 28, 0, Math.PI * 2);
  oc2.fillStyle = '#FFF176'; oc2.fill();

  // Clouds (static — drawn into cache too)
  function cloud(cx, cy, sc) {
    oc2.save(); oc2.translate(cx, cy); oc2.scale(sc, sc);
    oc2.fillStyle = 'rgba(255,255,255,0.85)';
    oc2.beginPath();
    oc2.arc( 0,   0,  20, 0, Math.PI * 2);
    oc2.arc(22,  -5,  16, 0, Math.PI * 2);
    oc2.arc(-20,  2,  14, 0, Math.PI * 2);
    oc2.arc(10,   5,  14, 0, Math.PI * 2);
    oc2.arc(-8,  -8,  16, 0, Math.PI * 2);
    oc2.fill(); oc2.restore();
  }
  cloud(W * 0.12, H * 0.15, 1.0);
  cloud(W * 0.38, H * 0.22, 0.7);
  cloud(W * 0.58, H * 0.11, 0.85);
  cloud(W * 0.78, H * 0.28, 0.6);

  skyCache = oc;
}

function drawSky() {
  if (!skyCache) buildSkyCache();
  ctx.drawImage(skyCache, 0, 0, W, H);
}


function drawTerrain() {
  // Sample terrain once at 6px intervals, reuse for fill + grass stroke
  const step = 6;
  const pts  = [];
  for (let sx = 0; sx <= W; sx += step) pts.push(getGroundAt(sx));

  if (!terrainGrad) {
    terrainGrad = ctx.createLinearGradient(0, H * 0.6, 0, H);
    terrainGrad.addColorStop(0,   '#3a7a30');
    terrainGrad.addColorStop(0.3, '#2d5a27');
    terrainGrad.addColorStop(1,   '#1a3a15');
  }

  ctx.beginPath();
  ctx.moveTo(0, pts[0]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(i * step, pts[i]);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = terrainGrad;
  ctx.fill();

  // Grass line reuses same points — no second getGroundAt pass
  ctx.strokeStyle = '#5aaf4f';
  ctx.lineWidth   = 3;
  ctx.beginPath();
  ctx.moveTo(0, pts[0]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(i * step, pts[i]);
  ctx.stroke();
}

function drawCar(car) {
  const { x, y, w, h, frame, state } = car;

  const wr  = h * 0.22;
  const wx1 = x + w * 0.20;   // front (left) wheel screen x
  const wx2 = x + w * 0.80;   // rear  (right) wheel screen x

  // Ground at each wheel — flatGround flag bypasses terrain for gallery use
  const gnd1 = car.flatGround ? y + h : getGroundAt(wx1);
  const gnd2 = car.flatGround ? y + h : getGroundAt(wx2);
  const ay1  = gnd1 - wr;     // front axle center y (wheel bottom = gnd)
  const ay2  = gnd2 - wr;     // rear  axle center y

  // Car tilt and mid-axle pivot in screen space
  const tilt = Math.atan2(ay2 - ay1, wx2 - wx1);
  const mx   = (wx1 + wx2) * 0.5;
  const my   = (ay1 + ay2) * 0.5;

  // ── Exhaust puffs (screen space, from rear axle) ──────────
  const exhaustAlpha = state === 'boarded' ? 0.60 : 0.28;
  for (let i = 0; i < 3; i++) {
    const pf    = ((frame * 0.85 + i * 0.34) % 1);
    const alpha = (1 - pf) * exhaustAlpha;
    ctx.beginPath();
    ctx.arc(wx2 + pf * 22, ay2 - pf * 10, 2 + pf * 8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(155,155,155,${alpha.toFixed(2)})`;
    ctx.fill();
  }

  // ── Speed lines when boarded ──────────────────────────────
  if (state === 'boarded') {
    for (let i = 0; i < 5; i++) {
      const ly   = ay2 - h * (0.05 + i * 0.12);
      const llen = 14 + i * 11 + Math.sin(frame * 4.5 + i * 1.3) * 5;
      ctx.strokeStyle = `rgba(255,255,255,${(0.12 + i * 0.04).toFixed(2)})`;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(wx2 + 6, ly);
      ctx.lineTo(wx2 + 6 + llen, ly);
      ctx.stroke();
    }
  }

  // ── Light glow (screen space, pre-body) ──────────────────
  const _fp = Math.floor(frame * (state === 'boarded' ? 3.5 : 1.8)) % 2;
  ctx.fillStyle = _fp === 0 ? 'rgba(255,20,20,0.12)' : 'rgba(20,60,255,0.12)';
  ctx.beginPath(); ctx.ellipse(mx, my - h * 0.38, w * 0.26, h * 0.22, tilt, 0, Math.PI*2); ctx.fill();

  // ── Car body — drawn in tilted local space ────────────────
  // Pivot: the mid-axle point. The design-space mid-axle is at
  // (x + w*0.5, y + h - wr*0.55); we map that to (mx, my) then rotate.
  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(tilt);
  ctx.translate(-(x + w * 0.5), -(y + h - wr * 0.55));

  // Flash phase for lights
  const flashRate  = state === 'boarded' ? 3.5 : 1.8;
  const flashPhase = Math.floor(frame * flashRate) % 2;

  // Lower body (police black)
  ctx.fillStyle = '#1c1c2e';
  ctx.fillRect(x + 2, y + h * 0.44, w - 4, h * 0.56);

  // White door stripe
  ctx.fillStyle = '#eeeef5';
  ctx.fillRect(x + 4, y + h * 0.55, w - 8, h * 0.13);

  // Cabin (trapezoid)
  ctx.fillStyle = '#1c1c2e';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.10, y + h * 0.44);
  ctx.lineTo(x + w * 0.20, y + h * 0.06);
  ctx.lineTo(x + w * 0.82, y + h * 0.06);
  ctx.lineTo(x + w * 0.92, y + h * 0.44);
  ctx.closePath();
  ctx.fill();

  // Light bar housing
  const lbX = x + w * 0.28, lbY = y + h * 0.02;
  const lbW = w * 0.44,     lbH = h * 0.08;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(lbX, lbY, lbW, lbH);
  // Red half
  ctx.fillStyle = flashPhase === 0 ? '#ff2020' : '#550000';
  ctx.fillRect(lbX + 1, lbY + 1, lbW * 0.5 - 2, lbH - 2);
  // Blue half
  ctx.fillStyle = flashPhase === 1 ? '#2244ff' : '#000066';
  ctx.fillRect(lbX + lbW * 0.5 + 1, lbY + 1, lbW * 0.5 - 2, lbH - 2);

  // Window
  ctx.fillStyle = state === 'boarded' ? '#aed6f1' : '#85c1e9';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.17, y + h * 0.41);
  ctx.lineTo(x + w * 0.26, y + h * 0.11);
  ctx.lineTo(x + w * 0.76, y + h * 0.11);
  ctx.lineTo(x + w * 0.85, y + h * 0.41);
  ctx.closePath();
  ctx.fill();

  // Window highlight
  ctx.fillStyle = 'rgba(255,255,255,0.26)';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.20, y + h * 0.38);
  ctx.lineTo(x + w * 0.28, y + h * 0.14);
  ctx.lineTo(x + w * 0.48, y + h * 0.14);
  ctx.lineTo(x + w * 0.45, y + h * 0.38);
  ctx.closePath();
  ctx.fill();

  // Player head peeking through window when boarded
  if (state === 'boarded') {
    const hx = x + w * 0.51, hy = y + h * 0.27;
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(hx, hy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.fillRect(hx - 3.5, hy - 1, 2, 2.5);
    ctx.fillRect(hx + 1.5, hy - 1, 2, 2.5);
  }

  // "POLICE" on door stripe
  ctx.fillStyle = '#1c1c2e';
  ctx.font = `bold ${Math.round(h * 0.13)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('POLICE', x + w * 0.50, y + h * 0.65);

  // Headlight (left = front)
  ctx.fillStyle = '#f4d03f';
  ctx.beginPath(); ctx.ellipse(x + 6, y + h * 0.60, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Body outline
  ctx.strokeStyle = '#0a0a1a'; ctx.lineWidth = 1.5;
  ctx.strokeRect(x + 2, y + h * 0.44, w - 4, h * 0.56);

  ctx.restore();

  // ── Wheels — drawn at actual ground-snapped axle positions ─
  for (const [wpx, way] of [[wx1, ay1], [wx2, ay2]]) {
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(wpx, way, wr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#bdc3c7';
    ctx.beginPath(); ctx.arc(wpx, way, wr * 0.56, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 1.5;
    for (let s = 0; s < 4; s++) {
      const angle = frame * 0.45 + s * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(wpx, way);
      ctx.lineTo(wpx + Math.cos(angle) * wr * 0.5, way + Math.sin(angle) * wr * 0.5);
      ctx.stroke();
    }
    ctx.fillStyle = '#ecf0f1';
    ctx.beginPath(); ctx.arc(wpx, way, wr * 0.18, 0, Math.PI * 2); ctx.fill();
  }

  // ── RIDE! arrow when available ────────────────────────────
  if (state === 'available') {
    const bounce = Math.sin(frame * 5) * 7;
    const ax = mx;
    const topY = my - (h - wr * 0.55 - h * 0.06);   // approx screen y of cabin peak
    const ay  = topY - 28 + bounce;

    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#0a0a1a';
    ctx.strokeText('RIDE!', ax, ay - 4);
    ctx.fillStyle = '#fff800';
    ctx.fillText('RIDE!', ax, ay - 4);

    ctx.fillStyle = '#1c1c2e';
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ax,      ay + 14);
    ctx.lineTo(ax - 11, ay + 3);
    ctx.lineTo(ax - 5,  ay + 3);
    ctx.lineTo(ax - 5,  ay - 4);
    ctx.lineTo(ax + 5,  ay - 4);
    ctx.lineTo(ax + 5,  ay + 3);
    ctx.lineTo(ax + 11, ay + 3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
}

function drawRock(rock) {
  const { x, y, w, h, seed } = rock;

  // Derive independent shape parameters from the seed using different
  // frequencies so they don't correlate with each other.
  const nPts      = 6 + Math.floor(((Math.sin(seed * 1.0) + 1) / 2) * 4); // 6–9 control points
  const jitterAmp = 0.14 + ((Math.sin(seed * 2.3) + 1) / 2) * 0.28;       // 0.14–0.42 radius variation
  const xScale    = 0.78 + ((Math.sin(seed * 3.7) + 1) / 2) * 0.38;       // 0.78–1.16 width stretch
  const yScale    = 0.78 + ((Math.sin(seed * 5.1) + 1) / 2) * 0.38;       // 0.78–1.16 height stretch
  const tilt      = (Math.sin(seed * 4.4)) * 0.22;                          // slight rotation

  const cx = x + w / 2;
  const cy = y + h * 0.55;
  const rx = (w / 2) * Math.min(xScale, 1.0);
  const ry = (h / 2) * Math.min(yScale, 1.0);

  // Build smooth control points
  const points = [];
  for (let i = 0; i < nPts; i++) {
    const angle  = (i / nPts) * Math.PI * 2 - Math.PI / 2 + tilt;
    const jitter = (1 - jitterAmp) + jitterAmp * 2 *
                   ((Math.sin(seed * 2.9 + i * (6.28 / nPts) * 1.3) + 1) / 2);
    // Gently flatten the bottom so the rock sits on the ground naturally
    const sinA   = Math.sin(angle - tilt);
    const flatten = (sinA > 0.15 && sinA < 0.95) ? 0.86 : 1;
    points.push({
      px: cx + Math.cos(angle) * rx * jitter,
      py: cy + Math.sin(angle) * ry * jitter * flatten,
    });
  }

  // Smooth bezier path through all control points
  ctx.beginPath();
  for (let i = 0; i < nPts; i++) {
    const curr = points[i];
    const next = points[(i + 1) % nPts];
    const mx   = (curr.px + next.px) / 2;
    const my   = (curr.py + next.py) / 2;
    i === 0 ? ctx.moveTo(mx, my) : null;
    ctx.quadraticCurveTo(curr.px, curr.py, mx, my);
  }
  ctx.closePath();

  // Layered radial gradient: bright highlight top-left → dark base
  const grad = ctx.createRadialGradient(
    cx - rx * 0.28, cy - ry * 0.38, rx * 0.05,
    cx + rx * 0.05, cy + ry * 0.1,  Math.max(rx, ry) * 1.1
  );
  grad.addColorStop(0,    '#c8c8c8');
  grad.addColorStop(0.25, '#9e9e9e');
  grad.addColorStop(0.6,  '#6b6b6b');
  grad.addColorStop(1,    '#3a3a3a');
  ctx.fillStyle = grad;
  ctx.fill();

  // Soft outer edge
  ctx.strokeStyle = 'rgba(30,30,30,0.5)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Top-left sheen clipped to the rock shape
  ctx.save();
  ctx.clip();
  const sheen = ctx.createRadialGradient(
    cx - rx * 0.3, cy - ry * 0.45, 0,
    cx - rx * 0.3, cy - ry * 0.45, rx * 0.72
  );
  sheen.addColorStop(0,   'rgba(255,255,255,0.28)');
  sheen.addColorStop(0.5, 'rgba(255,255,255,0.06)');
  sheen.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  ctx.fill();
  ctx.restore();

  // Seed-driven crack — different angle and length per rock
  const crackAngle = tilt + Math.sin(seed * 6.1) * 0.6;
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 0.8;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(crackAngle)       * rx * 0.28, cy + Math.sin(crackAngle)       * ry * 0.28);
  ctx.lineTo(cx + Math.cos(crackAngle + 0.9) * rx * 0.12, cy + Math.sin(crackAngle + 0.9) * ry * 0.12);
  ctx.lineTo(cx + Math.cos(crackAngle + 0.9) * rx * 0.35, cy + Math.sin(crackAngle + 0.9) * ry * 0.35);
  ctx.stroke();

}

function drawTrex(trex) {
  const { x, y, w, h, frame } = trex;
  const step  = Math.sin(frame * 6);
  const chomp = (Math.sin(frame * 5) + 1) * 0.5;

  ctx.save();
  ctx.translate(x, y);

  // Tail sweeping right
  ctx.fillStyle = '#3d7538';
  ctx.beginPath();
  ctx.moveTo(w * 0.65, h * 0.46);
  ctx.quadraticCurveTo(w * 1.02, h * 0.28 + step * 5, w * 1.08, h * 0.40 + step * 6);
  ctx.quadraticCurveTo(w * 1.02, h * 0.55, w * 0.65, h * 0.58);
  ctx.closePath();
  ctx.fill();

  // Main body
  ctx.fillStyle = '#4a8c3f';
  ctx.beginPath();
  ctx.ellipse(w * 0.50, h * 0.50, w * 0.25, h * 0.28, -0.12, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#7abf6e';
  ctx.beginPath();
  ctx.ellipse(w * 0.43, h * 0.56, w * 0.13, h * 0.16, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Neck
  ctx.fillStyle = '#4a8c3f';
  ctx.beginPath();
  ctx.moveTo(w * 0.30, h * 0.28);
  ctx.lineTo(w * 0.38, h * 0.38);
  ctx.lineTo(w * 0.24, h * 0.50);
  ctx.lineTo(w * 0.13, h * 0.43);
  ctx.closePath();
  ctx.fill();

  // Head (upper)
  ctx.fillStyle = '#4a8c3f';
  ctx.beginPath();
  ctx.ellipse(w * 0.13, h * 0.27, w * 0.16, h * 0.13, -0.25, 0, Math.PI * 2);
  ctx.fill();

  // Upper snout
  const upShift = chomp * h * 0.07;
  ctx.beginPath();
  ctx.moveTo(w * 0.06, h * 0.27 - upShift);
  ctx.lineTo(w * 0.00, h * 0.33 - upShift);
  ctx.lineTo(w * 0.06, h * 0.40 - upShift * 0.4);
  ctx.lineTo(w * 0.18, h * 0.37 - upShift * 0.2);
  ctx.closePath();
  ctx.fill();

  // Lower jaw
  const dnShift = chomp * h * 0.05;
  ctx.fillStyle = '#3d7538';
  ctx.beginPath();
  ctx.moveTo(w * 0.06, h * 0.40 + dnShift * 0.3);
  ctx.lineTo(w * 0.00, h * 0.44 + dnShift);
  ctx.lineTo(w * 0.15, h * 0.52 + dnShift * 0.5);
  ctx.lineTo(w * 0.22, h * 0.46);
  ctx.closePath();
  ctx.fill();

  // Mouth interior + teeth
  if (chomp > 0.15) {
    ctx.fillStyle = '#922b21';
    ctx.beginPath();
    ctx.moveTo(w * 0.03, h * 0.37 - upShift * 0.3);
    ctx.lineTo(w * 0.00, h * 0.40 + dnShift * 0.5);
    ctx.lineTo(w * 0.13, h * 0.50 + dnShift * 0.3);
    ctx.lineTo(w * 0.18, h * 0.41);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f0f0f0';
    for (let i = 0; i < 3; i++) {
      const tx = w * 0.04 + i * w * 0.055;
      const td = chomp * h * 0.06;
      ctx.beginPath();
      ctx.moveTo(tx, h * 0.38 - upShift * 0.3);
      ctx.lineTo(tx + w * 0.027, h * 0.38 + td - upShift * 0.3);
      ctx.lineTo(tx + w * 0.054, h * 0.38 - upShift * 0.3);
      ctx.fill();
    }
  }

  // Eye
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath(); ctx.arc(w * 0.10, h * 0.21, w * 0.046, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(w * 0.09, h * 0.21, w * 0.024, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#2d5c28'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(w * 0.04, h * 0.16); ctx.lineTo(w * 0.17, h * 0.18); ctx.stroke();

  // Tiny arms (signature T-Rex feature!)
  ctx.fillStyle = '#4a8c3f';
  ctx.beginPath();
  ctx.moveTo(w * 0.32, h * 0.40);
  ctx.quadraticCurveTo(w * 0.22, h * 0.50 + step * 3, w * 0.20, h * 0.58 + step * 3);
  ctx.lineTo(w * 0.27, h * 0.56 + step * 3);
  ctx.quadraticCurveTo(w * 0.30, h * 0.46, w * 0.37, h * 0.44);
  ctx.closePath();
  ctx.fill();

  // Big legs
  const la = step * 9;
  for (const [lx, swing] of [[w * 0.42, la], [w * 0.57, -la]]) {
    ctx.fillStyle = '#3d7538';
    ctx.beginPath();
    ctx.ellipse(lx, h * 0.76 - swing * 0.18, w * 0.09, h * 0.18, 0.1 + swing * 0.02, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(lx - swing * 0.28, h * 0.93 - Math.abs(swing) * 0.13, w * 0.11, h * 0.08, -0.25, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawMouse(mouse) {
  const { x, y, w, h, frame, nearPlayer } = mouse;
  const bob      = Math.sin(frame * 5) * 1.5;
  const tailWag  = Math.sin(frame * 7) * 4;
  const mouthOpen = nearPlayer ? (Math.sin(frame * 8) + 1) * 2.5 : 0;

  ctx.save();
  ctx.translate(x, y + bob);

  // Fish tail — forked, right side (rear of left-facing creature)
  const tailX = w * 0.84, midY = h * 0.50;
  ctx.fillStyle = '#5a8899';
  ctx.beginPath();
  ctx.moveTo(tailX, midY);
  ctx.lineTo(w + 5,  midY - h * 0.38 + tailWag);
  ctx.lineTo(w,      midY);
  ctx.lineTo(w + 5,  midY + h * 0.38 - tailWag);
  ctx.closePath();
  ctx.fill();

  // Fish body
  const bx = w * 0.46, by = h * 0.50;
  const brx = w * 0.40, bry = h * 0.38;
  ctx.fillStyle = '#7fa8b8';
  ctx.beginPath();
  ctx.ellipse(bx, by, brx, bry, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pale belly
  ctx.fillStyle = '#c0dce8';
  ctx.beginPath();
  ctx.ellipse(bx + 2, by + h * 0.10, brx * 0.68, bry * 0.50, 0.18, 0, Math.PI * 2);
  ctx.fill();

  // Scales (curved arcs)
  ctx.strokeStyle = 'rgba(50,85,105,0.28)';
  ctx.lineWidth = 0.9;
  for (let i = 0; i < 4; i++) {
    const sx = bx - brx * 0.25 + i * brx * 0.52;
    ctx.beginPath();
    ctx.arc(sx, by + h * 0.06, bry * 0.62, -Math.PI * 0.55, 0.12);
    ctx.stroke();
  }

  // Dorsal fin
  ctx.fillStyle = '#5a8899';
  ctx.beginPath();
  ctx.moveTo(bx - brx * 0.28, by - bry * 0.88);
  ctx.quadraticCurveTo(bx + brx * 0.05, by - bry - h * 0.44, bx + brx * 0.32, by - bry * 0.92);
  ctx.closePath();
  ctx.fill();

  // Pectoral fin (side)
  ctx.fillStyle = 'rgba(90,136,153,0.68)';
  ctx.beginPath();
  ctx.moveTo(bx - brx * 0.08, by + bry * 0.18);
  ctx.quadraticCurveTo(bx - brx * 0.14, by + bry + h * 0.20, bx + brx * 0.28, by + bry * 0.22);
  ctx.closePath();
  ctx.fill();

  // Mouse head (grey, blends into body left side)
  const hx = w * 0.18, hy = h * 0.48;
  ctx.fillStyle = '#909090';
  ctx.beginPath();
  ctx.arc(hx, hy, h * 0.37, 0, Math.PI * 2);
  ctx.fill();

  // Ears (round, on top — two sizes)
  for (const [ex, ey, ro, ri] of [
    [hx - h * 0.08, hy - h * 0.30, h * 0.20, h * 0.12],
    [hx + h * 0.12, hy - h * 0.27, h * 0.15, h * 0.09],
  ]) {
    ctx.fillStyle = '#787878';
    ctx.beginPath(); ctx.arc(ex, ey, ro, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e899aa';
    ctx.beginPath(); ctx.arc(ex, ey, ri, 0, Math.PI * 2); ctx.fill();
  }

  // Snout
  ctx.fillStyle = '#b8b8b8';
  ctx.beginPath();
  ctx.ellipse(hx - h * 0.28, hy + h * 0.04, h * 0.17, h * 0.12, -0.25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FF9999';
  ctx.beginPath();
  ctx.arc(hx - h * 0.40, hy + h * 0.01, h * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(hx - h * 0.08, hy - h * 0.10, h * 0.10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff2222';
  ctx.beginPath(); ctx.arc(hx - h * 0.08, hy - h * 0.10, h * 0.056, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath(); ctx.arc(hx - h * 0.11, hy - h * 0.13, h * 0.028, 0, Math.PI * 2); ctx.fill();

  // Mouth (triangle; opens near player, shows fangs)
  ctx.fillStyle = '#bb2222';
  ctx.beginPath();
  ctx.moveTo(hx - h * 0.33, hy + h * 0.06);
  ctx.lineTo(hx - h * 0.14, hy + h * 0.06 + mouthOpen);
  ctx.lineTo(hx - h * 0.14, hy + h * 0.06 - mouthOpen);
  ctx.closePath();
  ctx.fill();
  if (mouthOpen > 1) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(hx - h * 0.31, hy + h * 0.06 - mouthOpen + 0.5);
    ctx.lineTo(hx - h * 0.24, hy + h * 0.06);
    ctx.lineTo(hx - h * 0.17, hy + h * 0.06 - mouthOpen + 0.5);
    ctx.closePath();
    ctx.fill();
  }

  // Whiskers




  
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.6;
  const wbx = hx - h * 0.30, wby = hy + h * 0.03;
  ctx.beginPath();
  ctx.moveTo(wbx, wby - h * 0.05); ctx.lineTo(wbx - h * 0.40, wby - h * 0.15);
  ctx.moveTo(wbx, wby);             ctx.lineTo(wbx - h * 0.44, wby + h * 0.02);
  ctx.moveTo(wbx, wby + h * 0.05); ctx.lineTo(wbx - h * 0.40, wby + h * 0.14);
  ctx.stroke();

  ctx.restore();
}

function drawPlayer(p) {
  const { x, y, w, h, onGround, legFrame } = p || { ...player, legFrame: score };
  const cx = x + w / 2;
  const airborne = !onGround;
  const t = legFrame || 0;

  const headR  = w * 0.31;
  const headCY = y + headR + 1;

  const shirtW = w * 0.74;
  const shirtT = headCY + headR * 0.72;
  const shirtB = y + h * 0.78;
  const shirtL = cx - shirtW / 2;

  // Legs (dark pants)
  ctx.fillStyle = '#37474f';
  const legW = shirtW * 0.36;
  const legH = (y + h) - shirtB;
  if (airborne) {
    ctx.fillRect(cx - shirtW * 0.32, shirtB, legW, legH * 0.9);
    ctx.fillRect(cx + shirtW * 0.32 - legW, shirtB, legW, legH * 0.9);
  } else {
    const la = Math.sin(t * 0.28) * 3;
    ctx.fillRect(cx - shirtW * 0.32, shirtB + la,  legW, legH - la);
    ctx.fillRect(cx + shirtW * 0.32 - legW, shirtB - la, legW, legH + la);
  }

  // Tzitzis — 1 string each side
  const tzLen = h * 0.28;
  ctx.lineWidth = 1.4;
  ctx.strokeStyle = '#fffff4';
  ctx.fillStyle = '#fffff4';
  for (let i = 0; i < 2; i++) {
    const tx0 = i === 0 ? cx - shirtW * 0.32 : cx + shirtW * 0.32;
    const ty0 = shirtB;
    const sway = Math.sin(t * 0.18 + i * 0.9) * 2;
    const tx1 = tx0 + sway;
    const ty1 = ty0 + tzLen;
    ctx.beginPath();
    ctx.moveTo(tx0, ty0);
    ctx.quadraticCurveTo(tx0 + sway * 0.5, ty0 + tzLen * 0.5, tx1, ty1);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(tx1, ty1, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Red shirt body
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(shirtL, shirtT, shirtW, shirtB - shirtT);

  // Neck
  ctx.fillStyle = '#ffcc80';
  ctx.fillRect(cx - headR * 0.35, headCY + headR * 0.68, headR * 0.70, shirtT - (headCY + headR * 0.68) + 1);

  // Head (skin)
  ctx.fillStyle = '#ffcc80';
  ctx.beginPath();
  ctx.arc(cx, headCY, headR, 0, Math.PI * 2);
  ctx.fill();

  // Yarmulka (kippah) — solid blue, clipped to top of head
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, headCY, headR, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = '#1a237e';
  ctx.fillRect(cx - headR, headCY - headR, headR * 2, headR * 0.68);
  ctx.restore();

  // Eyes
  ctx.fillStyle = '#333';
  const eyeY = headCY + headR * 0.08;
  ctx.fillRect(cx - headR * 0.52, eyeY, headR * 0.26, headR * 0.34);
  ctx.fillRect(cx + headR * 0.26, eyeY, headR * 0.26, headR * 0.34);

}

function fillTextWrapped(ctx, text, cx, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, cx, y);
      line = word;
      y += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, cx, y);
}

function drawGallery() {
  designFrame += 0.08;

  drawSky();
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.fillRect(0, 0, W, H);

  // ── Build entity list ──────────────────────────────────
  const entries = [
    {
      label: 'Player', desc: "That's you!",
      w: 36, h: 48, drawFn: drawPlayer,
      makeObj: () => ({ x: 0, y: 0, w: 36, h: 48, onGround: true, legFrame: designFrame * 10 }),
    },
    ...Object.entries(ENEMY_TYPES).map(([type, def]) => ({
      label:   def.galleryLabel || type.charAt(0).toUpperCase() + type.slice(1),
      desc:    def.galleryDesc || def.deathSub,
      w: def.w, h: def.h, drawFn: def.draw,
      makeObj: () => ({ x: 0, y: 0, w: def.w, h: def.h, frame: designFrame, ...def.galleryProps }),
    })),
    {
      label: 'Fire Pool', desc: 'Avoid falling in!',
      w: 60, h: 36, drawFn: drawFirePoolLocal,
      makeObj: () => ({ x: 0, y: 0, w: 60, h: 36, frame: designFrame, seed: 7 }),
    },
    {
      label: 'Car', desc: 'Walk into it to board — jump to drive, jump again in air to bail out!',
      w: CAR_W, h: CAR_H, drawFn: drawCar,
      makeObj: () => ({ x: 0, y: 0, w: CAR_W, h: CAR_H, frame: designFrame, state: 'available', flatGround: true }),
    },
  ];
  const count = entries.length;

  // ── Layout: portrait = 2-col grid, landscape = single row ─
  const portrait  = H > W;
  const cols      = portrait ? 2 : count;
  const rows      = Math.ceil(count / cols);
  const cellW     = W / cols;

  // Vertical space: leave room for header and footer
  const headerH   = H * (portrait ? 0.14 : 0.18);
  const footerH   = H * 0.07;
  const bodyH     = H - headerH - footerH;
  const cellH     = bodyH / rows;

  // How far down within each cell the ground sits (80%)
  const GROUND_FRAC = 0.80;

  const titleSize = Math.max(18, Math.round(Math.min(W, H) * (portrait ? 0.07 : 0.058)));
  const subSize   = Math.max(11, Math.round(Math.min(W, H) * (portrait ? 0.038 : 0.028)));
  const labelSize = Math.max(12, Math.round(cellH * 0.10));
  const descSize  = Math.max(9,  Math.round(cellH * 0.07));

  // ── Title ─────────────────────────────────────────────
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${titleSize}px monospace`;
  ctx.fillText('🎨 Design Gallery', W / 2, headerH * 0.5);

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = `${subSize}px monospace`;
  ctx.fillText(
    portrait ? 'All characters & obstacles' : 'All characters & obstacles — animated as they appear in game',
    W / 2, headerH * 0.5 + titleSize * 1.15
  );

  // ── Draw one ground strip per row ────────────────────
  for (let r = 0; r < rows; r++) {
    const gy = headerH + cellH * r + cellH * GROUND_FRAC;
    const grad = ctx.createLinearGradient(0, gy, 0, gy + cellH * (1 - GROUND_FRAC) + footerH);
    grad.addColorStop(0,   '#3a7a30');
    grad.addColorStop(0.4, '#2d5a27');
    grad.addColorStop(1,   '#1a3a15');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, H - gy);
    ctx.fillStyle = '#5aaf4f';
    ctx.fillRect(0, gy, W, 3);
  }

  // ── Draw each entity ──────────────────────────────────
  const scale = Math.min(
    Math.max(cellW / 120, 1.5),
    Math.max(cellH * GROUND_FRAC / 80, 1.5),
    portrait ? 5 : 4.5
  );

  for (let i = 0; i < count; i++) {
    const ent = entries[i];
    const col = i % cols;
    const row = Math.floor(i / cols);

    // Centre of this cell, with last-row centering when count is odd
    const rowCount    = (row === rows - 1) ? count - row * cols : cols;
    const colOffset   = (cols - rowCount) / 2; // shift odd last row to center
    const cx = cellW * (col + colOffset + 0.5);
    const groundY = headerH + cellH * row + cellH * GROUND_FRAC;

    // Shadow
    ctx.beginPath();
    ctx.ellipse(cx, groundY + 5, ent.w * scale * 0.5, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fill();

    // Entity
    ctx.save();
    ctx.translate(cx, groundY);
    ctx.scale(scale, scale);
    ctx.translate(-ent.w / 2, -ent.h);
    ent.drawFn(ent.makeObj());
    ctx.restore();

    // Name
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${labelSize}px monospace`;
    ctx.fillText(ent.label, cx, groundY + labelSize * 1.8);

    // Description (wrapped to fit cell)
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = `${descSize}px monospace`;
    fillTextWrapped(ctx, ent.desc, cx, groundY + labelSize * 1.8 + descSize * 1.7, cellW * 0.88, descSize * 1.35);
  }

  // ── Footer ────────────────────────────────────────────
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = `${Math.max(10, Math.round(Math.min(W, H) * 0.022))}px monospace`;
  ctx.fillText('Tap "🎨 Gallery" again to return to the game', W / 2, H * 0.965);
}

function _drawLava(x, top, w, bottom, frame, seed) {
  const midX = x + w / 2;

  // Lava body: deep dark gradient filling the pit
  const body = ctx.createLinearGradient(0, top, 0, bottom);
  body.addColorStop(0,    '#ff5500');
  body.addColorStop(0.12, '#cc2200');
  body.addColorStop(0.45, '#7a0e00');
  body.addColorStop(1,    '#120000');
  ctx.fillStyle = body;
  ctx.fillRect(x, top, w, bottom - top + 2);

  // Wavy molten surface as a filled polygon
  ctx.beginPath();
  ctx.moveTo(x, bottom + 2);
  ctx.lineTo(x, top);
  for (let fx = x; fx <= x + w; fx += 2) {
    const ph  = seed * 2.3 + (fx - x) * 0.09;
    const wy  = top + 3 * Math.sin(frame * 1.6 + ph) + 2 * Math.sin(frame * 2.8 + ph * 1.7);
    ctx.lineTo(fx, wy);
  }
  ctx.lineTo(x + w, bottom + 2);
  ctx.closePath();
  const surf = ctx.createLinearGradient(0, top - 6, 0, bottom);
  surf.addColorStop(0,    '#ff7700');
  surf.addColorStop(0.06, '#ff4400');
  surf.addColorStop(0.22, '#cc2200');
  surf.addColorStop(0.55, '#7a0e00');
  surf.addColorStop(1,    '#120000');
  ctx.fillStyle = surf;
  ctx.fill();

  // Dark cooling crust patches drifting on the surface
  for (let i = 0; i < 4; i++) {
    const ph  = seed * 6.1 + i * 2.9;
    const t   = ((frame * 0.09 + ph) % 1 + 1) % 1;
    const cx  = x + w * t;
    const cy  = top + 2 * Math.sin(frame * 1.6 + ph * 1.4);
    const rw  = w * (0.06 + 0.05 * Math.abs(Math.sin(ph * 3.3)));
    const rh  = Math.max(1, (bottom - top) * 0.07 + 1.5 * Math.sin(ph * 2.7));
    ctx.beginPath();
    ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(30,2,0,0.7)';
    ctx.fill();
  }

  // Glowing hot spots — bright orange/yellow circles on the surface
  for (let i = 0; i < 3; i++) {
    const ph  = seed * 4.3 + i * 3.7;
    const hx  = x + w * (0.1 + 0.8 * (((ph * 0.41) % 1) + 1) % 1);
    const hy  = top + 1.5 * Math.sin(frame * 2.0 + ph);
    const hr  = (bottom - top) * (0.12 + 0.08 * Math.abs(Math.sin(frame * 1.3 + ph)));
    const hg  = ctx.createRadialGradient(hx, hy, 0, hx, hy, hr * 3);
    hg.addColorStop(0,   'rgba(255,240,80,0.95)');
    hg.addColorStop(0.3, 'rgba(255,120, 0,0.65)');
    hg.addColorStop(1,   'rgba(200, 40, 0,0)');
    ctx.beginPath(); ctx.arc(hx, hy, hr * 3, 0, Math.PI * 2);
    ctx.fillStyle = hg; ctx.fill();
  }

  // Bubbles rising and popping at the surface
  for (let i = 0; i < 4; i++) {
    const ph  = seed * 5.9 + i * 4.1;
    const bt  = ((frame * 0.55 + ph) % (Math.PI * 2)) / (Math.PI * 2);
    if (bt > 0.88) continue;
    const bx  = x + w * (0.08 + 0.84 * (((ph * 0.29) % 1) + 1) % 1);
    const by  = top + 2 - bt * (bottom - top) * 0.18;
    const br  = (bottom - top) * (0.04 + 0.04 * bt);
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,${Math.round(90 + bt * 120)},0,${0.75 - bt * 0.45})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(255,210,40,${0.55 - bt * 0.35})`;
    ctx.lineWidth = 0.7; ctx.stroke();
  }

  // Soft orange glow rising above the surface
  const glow = ctx.createRadialGradient(midX, top, 0, midX, top, w * 0.75);
  glow.addColorStop(0,   'rgba(255,80,0,0.38)');
  glow.addColorStop(0.5, 'rgba(200,40,0,0.13)');
  glow.addColorStop(1,   'rgba(150,20,0,0)');
  ctx.fillStyle = glow;
  const glowH = (bottom - top) * 0.8;
  ctx.fillRect(x - 12, top - glowH, w + 24, glowH);
}

function drawFirePoolLocal(obj) {
  const { x, y, w, h, frame, seed } = obj;
  const top    = y + h * 0.18;
  const bottom = y + h;
  _drawLava(x, top, w, bottom, frame, seed);
}

function drawFirePool(pool) {
  const { frame, seed } = pool;
  const s    = pool.worldStart - terrainOffset;
  const e    = pool.worldEnd   - terrainOffset;
  const left = s - POOL_SLOPE;
  const rght = e + POOL_SLOPE;
  if (rght < -10 || left > W + 10) return;
  const lavaTop = H - H * 0.15;
  _drawLava(left, lavaTop, rght - left, H, frame, seed);
}

function drawWelcome() {

  const cx = W / 2;
  const vfloor = H >= 450 ? Math.min(Math.min(W, H), 480) * 0.036 : 0;
