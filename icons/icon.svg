<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="55%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
    <clipPath id="rnd"><rect width="512" height="512" rx="96" ry="96"/></clipPath>
  </defs>
  <!-- Sky -->
  <rect width="512" height="512" rx="96" ry="88" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="396" cy="106" r="62" fill="#ffe082" opacity="0.5"/>
  <circle cx="396" cy="106" r="44" fill="#fff9c4"/>
  <!-- Clouds -->
  <g fill="rgba(255,255,255,0.82)">
    <ellipse cx="108" cy="90" rx="46" ry="24"/>
    <ellipse cx="148" cy="80" rx="34" ry="20"/>
    <ellipse cx="80"  cy="80" rx="30" ry="18"/>
    <ellipse cx="272" cy="112" rx="38" ry="20"/>
    <ellipse cx="305" cy="103" rx="28" ry="16"/>
  </g>
  <!-- Hill (back) -->
  <ellipse cx="256" cy="520" rx="380" ry="240" fill="#2d5a27" clip-path="url(#rnd)"/>
  <!-- Grass line -->
  <rect x="0" y="330" width="512" height="6" fill="#5aaf4f" clip-path="url(#rnd)"/>
  <!-- Hill (front) -->
  <ellipse cx="430" cy="530" rx="260" ry="200" fill="#3a7a30" clip-path="url(#rnd)"/>
  <!-- Running character (white, bold) -->
  <!-- Head -->
  <circle cx="196" cy="258" r="34" fill="#fff"/>
  <!-- Body -->
  <rect x="178" y="290" width="36" height="46" rx="10" fill="#fff"/>
  <!-- Arms -->
  <line x1="214" y1="302" x2="248" y2="282" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <line x1="178" y1="302" x2="146" y2="284" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <!-- Legs (running) -->
  <line x1="200" y1="334" x2="224" y2="368" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <line x1="192" y1="334" x2="164" y2="362" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
</svg>
